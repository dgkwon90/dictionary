name: release

# 정식 버전 태그(v*)를 push하면 각 플랫폼 네이티브 러너에서 빌드해 GitHub Release로 게시한다(#32).
# 4-job 구조(quality → create-release → build 매트릭스 → publish): 병렬 매트릭스 각 leg이 같은
# 릴리스를 동시에 find-or-create하려다 충돌하는 tauri-action race를 피한다(codex 지적). 릴리스는
# 한 번만 생성되고 모든 빌드가 자산을 올린 뒤 draft→공개로 전환된다.
# macOS=애드혹 서명(Apple 계정 불필요), Windows=미서명(SmartScreen 경고 — MVP 수용).
# Windows는 macOS 크로스컴파일이 비권장이라 windows 러너에서 빌드한다(Tauri 표준).
# quality(RW-10, review R-10)를 재사용해 태그 릴리스도 배포 전 같은 게이트를 다시 통과해야
# 한다 — PR에서 이미 통과했더라도, 태그 시점의 정확한 커밋 기준으로 다시 검증한다.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  create-release:
    needs: quality
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Neulsang ${tag}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop-ui/package-lock.json

      - name: Setup Go (사이드카 desktopd 빌드용)
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: apps/desktopd/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-ui/src-tauri

      - name: Install frontend deps
        run: npm ci
        working-directory: apps/desktop-ui

      # tauri-action이 beforeBuildCommand(build:sidecar → TAURI_ENV_TARGET_TRIPLE로 사이드카 빌드)
      # 를 실행하고, 번들 생성 후 create-release가 만든 릴리스(releaseId)에 자산을 올린다.
      - name: Build & upload assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop-ui
          args: ${{ matrix.args }}
          releaseId: ${{ needs.create-release.outputs.release_id }}

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      # 모든 플랫폼 빌드가 성공해 자산을 올린 뒤 draft를 공개로 전환한다.
      # draft로 남겨 사람이 확인 후 수동 Publish하려면 이 job을 삭제하면 된다.
      - name: Publish release (draft -> public)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
